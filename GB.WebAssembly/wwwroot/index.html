<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GB.WebAssembly</title>
    <base href="/" />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="GB.WebAssembly.styles.css" rel="stylesheet" />
    <link href="manifest.json" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Blazor.Extensions.Canvas/blazor.extensions.canvas.js"></script>

    <script>
        function gameLoop(timeStamp) {
            theInstance.invokeMethodAsync('GameLoop', timeStamp);
            window.requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', function(e) {
            if (theInstance) {
                theInstance.invokeMethodAsync('OnKeyDown', e.key);
            }
        });

        document.addEventListener('keyup', function (e) {
            if (theInstance) {
                theInstance.invokeMethodAsync('OnKeyUp', e.key);
            }
        });

        window.initEmulator = (instance) => {
            window.theInstance = instance;
            window.requestAnimationFrame(gameLoop);
        };
    </script>

    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
